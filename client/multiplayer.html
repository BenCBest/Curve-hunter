<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Curve Racer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100vw; height: 100vh; padding: 0; }
    #game-container { position: relative; flex-shrink: 0; transform-origin: center center; margin-bottom: 0; }
    canvas { display: block; position: absolute; top: 0; left: 0; z-index: 0; }
    #hud { position: absolute; top: 16px; left: 16px; z-index: 2; color: #fff; font-size: 14px; line-height: 1.8; pointer-events: none; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.75); color: white; }
    .overlay.hidden { display: none; }
    .overlay h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    .overlay p { font-size: 1rem; color: #aaa; margin-bottom: 0.4rem; }
    .overlay button { margin-top: 0.8rem; padding: 0.6rem 2rem; font-size: 1rem; border: none; color: white; cursor: pointer; font-family: monospace; border-radius: 4px; min-width: 220px; }
    .btn-sp  { background: #2980b9; } .btn-sp:hover  { background: #1a6a9a; }
    .btn-1v1 { background: #27ae60; } .btn-1v1:hover { background: #1e8449; }
    .btn-5p  { background: #e74c3c; } .btn-5p:hover  { background: #c0392b; }
    .btn-ter { background: #555;    } .btn-ter:hover { background: #333;    }
    #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 8rem; font-family: monospace; color: #fff; pointer-events: none; z-index: 3; display: none; text-shadow: 0 0 40px rgba(231,76,60,0.8); }
    #spectate  { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.4rem; color: #aaa; pointer-events: none; z-index: 3; display: none; background: rgba(0,0,0,0.5); padding: 0.5rem 1.5rem; border-radius: 6px; }
    #error-msg { color: #e74c3c; margin-top: 0.5rem; font-size: 0.9rem; min-height: 1.2rem; }
    .divider { width: 220px; border: none; border-top: 1px solid #444; margin: 0.6rem 0 0; }
    #mobile-controls { display: none; position: fixed; bottom: 0; left: 0; width: 100%; height: 180px; z-index: 10; pointer-events: none; background: #000; }
    .mobile-btn { position: absolute; top: 0; height: 100%; width: 50%; background: #333; display: flex; align-items: center; justify-content: center; pointer-events: all; user-select: none; -webkit-user-select: none; touch-action: none; font-size: 3.5rem; color: #888; border-top: 3px solid #555; }
    .mobile-btn:active { background: #555; color: #aaa; }
    #btn-left  { left: 0; border-right: 2px solid #555; }
    #btn-right { right: 0; border-left: 2px solid #555; }
    @media (pointer: coarse), (max-width: 768px) {
      #mobile-controls { display: block; }
      .overlay h1 { font-size: 3.5rem; }
      .overlay p { font-size: 1.4rem; }
      .overlay button { font-size: 1.4rem; padding: 1rem 2rem; min-width: 280px; margin-top: 1.2rem; }
    }
  </style>
</head>
<body>
<div id="game-container">
<canvas id="c"></canvas>
<div id="hud" class="hidden">
  <div id="hud-active"></div>
</div>
<div id="screen-menu" class="overlay">
  <h1>Curve Racer</h1>
  <p>Pfeiltasten zum Lenken</p>
  <p>Keine Taste = beschleunigen | Taste = abbremsen + kurven</p>
  <p>Schnellerer Spieler gewinnt die Kollision!</p>
  <button id="btn-single" class="btn-sp">Einzelspieler (vs Bots)</button>
  <hr class="divider">
  <button id="btn-1v1"  class="btn-1v1">Online: 1v1</button>
  <button id="btn-find" class="btn-5p">Online: 5 Spieler</button>
  <p id="error-msg"></p>
</div>
<div id="screen-wait" class="overlay hidden">
  <h1 id="wait-title">Suche Spieler...</h1>
  <p id="queue-count">0 / ? Spieler</p>
  <button id="btn-cancel" class="btn-ter">Abbrechen</button>
</div>
<div id="screen-result" class="overlay hidden">
  <h1 id="result-title">Ergebnis</h1>
  <p id="result-sub"></p>
  <button id="btn-again" class="btn-5p">Nochmal</button>
  <button id="btn-menu"  class="btn-ter">Hauptmenue</button>
</div>
<div id="countdown"></div>
<div id="spectate">Du schaust zu</div>
</div>
<div id="mobile-controls">
  <div class="mobile-btn" id="btn-left">&#8592;</div>
  <div class="mobile-btn" id="btn-right">&#8594;</div>
</div><script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const hudEl=document.getElementById('hud');
const hudActiveEl=document.getElementById('hud-active');
const cdEl=document.getElementById('countdown'),specEl=document.getElementById('spectate');
const errEl=document.getElementById('error-msg'),qcEl=document.getElementById('queue-count');
const waitTitleEl=document.getElementById('wait-title');
const SCREENS={menu:document.getElementById('screen-menu'),wait:document.getElementById('screen-wait'),result:document.getElementById('screen-result')};
function showScreen(n){for(const[k,el]of Object.entries(SCREENS))el.classList.toggle('hidden',k!==n);}

const GAME_W_LANDSCAPE=1920,GAME_H_LANDSCAPE=1080;
const GAME_W_PORTRAIT=1080,GAME_H_PORTRAIT=1920;
const BORDER=30;

function isMobile(){return window.matchMedia('(pointer: coarse)').matches||window.innerWidth<=768;}
function isPortrait(){return window.innerHeight>window.innerWidth;}
function getMobileOffset(){return isMobile()?220:0;}

let GAME_W=GAME_W_LANDSCAPE,GAME_H=GAME_H_LANDSCAPE;

function setCanvasSize(w,h){
  GAME_W=w;GAME_H=h;
  canvas.width=w;canvas.height=h;
  const container=document.getElementById('game-container');
  container.style.width=w+'px';container.style.height=h+'px';
}

function applyZoom(){
  const container=document.getElementById('game-container');
  const mobileControls=document.getElementById('mobile-controls');
  const controlsHeight=isMobile()&&mobileControls?mobileControls.offsetHeight:0;
  const availH=window.innerHeight-controlsHeight;
  const scale=Math.min(window.innerWidth/GAME_W,availH/GAME_H);
  container.style.transform='scale('+scale+')';
  // Box zentrieren im verfügbaren Raum (oberhalb der Buttons)
  if(isMobile()&&controlsHeight>0){
    const scaledHeight=GAME_H*scale;
    const offset=(availH-scaledHeight)/2;
    container.style.marginTop=offset+'px';
    container.style.marginBottom=offset+'px';
  }else{
    container.style.marginTop='0';
    container.style.marginBottom='0';
  }
}

setCanvasSize(isPortrait()?GAME_W_PORTRAIT:GAME_W_LANDSCAPE,isPortrait()?GAME_H_PORTRAIT:GAME_H_LANDSCAPE);
applyZoom();
window.addEventListener('resize',()=>{
  if(phase==='menu'||phase==='result'){
    setCanvasSize(isPortrait()?GAME_W_PORTRAIT:GAME_W_LANDSCAPE,isPortrait()?GAME_H_PORTRAIT:GAME_H_LANDSCAPE);
    if(spObstacles.length)spDrawPreview();
  }
  applyZoom();
});

const TURN_RATE=4.5,ACCEL=Math.LN2/8,DECEL=Math.LN2/5,MIN_SPD=100,MAX_SPD=3000,PRADIUS=14;
const BOT_COLORS=['#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22'];
const NUM_BOTS=15;
function getNumObs(){return 15;}

let phase='menu';
let animId=null,lastTime=null,spStartTime=null,spMaxSpeed=MIN_SPD;
let spPlayer=null,spBots=[],spObstacles=[];
let spLastMode='single';

const keys={ArrowLeft:false,ArrowRight:false};
window.addEventListener('keydown',e=>{if(!(e.key in keys))return;e.preventDefault();keys[e.key]=true;if(phase==='mp-active')sendInput();});
window.addEventListener('keyup',e=>{if(!(e.key in keys))return;keys[e.key]=false;if(phase==='mp-active')sendInput();});

const btnLeft=document.getElementById('btn-left'),btnRight=document.getElementById('btn-right');
function setKey(key,val){keys[key]=val;if(phase==='mp-active')sendInput();}
btnLeft.addEventListener('touchstart',e=>{e.preventDefault();setKey('ArrowLeft',true);},{passive:false});
btnLeft.addEventListener('touchend',e=>{e.preventDefault();setKey('ArrowLeft',false);},{passive:false});
btnRight.addEventListener('touchstart',e=>{e.preventDefault();setKey('ArrowRight',true);},{passive:false});
btnRight.addEventListener('touchend',e=>{e.preventDefault();setKey('ArrowRight',false);},{passive:false});

function h2r(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return 'rgb('+r+','+g+','+b+')';}

const particles=[];
function spawnExplosion(x,y,color){
  for(let i=0;i<18;i++){const angle=Math.random()*Math.PI*2,speed=80+Math.random()*220;particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1,color});}
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.92;p.vy*=0.92;p.life-=dt*2.5;if(p.life<=0)particles.splice(i,1);}
}
function drawParticles(){
  for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.beginPath();ctx.arc(p.x,p.y,4+p.life*6,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();ctx.restore();}
}

function drawBg(obs){
  ctx.fillStyle='#111';ctx.fillRect(0,0,GAME_W,GAME_H);
  ctx.fillStyle='#888';
  ctx.fillRect(0,0,GAME_W,BORDER);ctx.fillRect(0,GAME_H-BORDER,GAME_W,BORDER);
  ctx.fillRect(0,0,BORDER,GAME_H);ctx.fillRect(GAME_W-BORDER,0,BORDER,GAME_H);
  ctx.strokeStyle='#aaa';ctx.lineWidth=2;ctx.strokeRect(BORDER,BORDER,GAME_W-BORDER*2,GAME_H-BORDER*2);
  ctx.fillStyle='#aaa';
  for(const o of obs){ctx.fillRect(o.x,o.y,o.w,o.h);ctx.strokeStyle='#888';ctx.lineWidth=1;ctx.strokeRect(o.x,o.y,o.w,o.h);}
}

function drawTrail(trail,speed,color){
  if(!trail||trail.length<2)return;
  const tailLen=Math.min(trail.length,Math.floor(8+speed/3)),start=trail.length-tailLen;
  const glow=Math.min(1,Math.max(0,(speed-200)/600));
  ctx.save();
  if(glow>0){ctx.shadowColor=color.replace('rgb','rgba').replace(')',',1)');ctx.shadowBlur=10+glow*60;for(let i=start+1;i<trail.length;i++){const t=(i-start)/tailLen,a=trail[i-1],b=trail[i];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=color.replace('rgb','rgba').replace(')',','+t*glow*0.7+')');ctx.lineWidth=6+t*(14+glow*35);ctx.stroke();}}
  ctx.shadowBlur=0;
  for(let i=start+1;i<trail.length;i++){const t=(i-start)/tailLen,a=trail[i-1],b=trail[i];ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=color.replace('rgb','rgba').replace(')',','+(t*(0.6+glow*0.4))+')');ctx.lineWidth=3+t*(8+glow*14);ctx.stroke();}
  ctx.restore();
}

function fakeTrail(x,y,angle){const t=[];for(let i=8;i>=0;i--)t.push({x:x+Math.cos(angle+Math.PI)*i*6,y:y+Math.sin(angle+Math.PI)*i*6});t.push({x,y});return t;}

function circleRect(cx,cy,r,rx,ry,rw,rh){const nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh)),dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<r*r;}
function angleDiff(t,c){let d=t-c;while(d>Math.PI)d-=Math.PI*2;while(d<-Math.PI)d+=Math.PI*2;return d;}

function raycastCurved(ox,oy,angle,speed,turnDir,maxDist){
  const steps=60,stepSize=maxDist/steps,tr=turnDir!==0?TURN_RATE/(1+Math.pow(speed/300,2)*8):0;
  let cx=ox,cy=oy,ca=angle;const m=BORDER+PRADIUS+14;
  for(let i=1;i<=steps;i++){ca+=tr*turnDir*(stepSize/Math.max(speed,1));cx+=Math.cos(ca)*stepSize;cy+=Math.sin(ca)*stepSize;if(cx<m||cx>GAME_W-m||cy<m||cy>GAME_H-m)return stepSize*i;for(const o of spObstacles)if(circleRect(cx,cy,PRADIUS+14,o.x,o.y,o.w,o.h))return stepSize*i;}
  return maxDist;
}

function randomObstacles(){
  const obs=[],GAP=20,edge=BORDER+30;
  for(let i=0;i<getNumObs();i++){for(let a=0;a<100;a++){const w=20+Math.random()*220,h=15+Math.random()*160,x=edge+Math.random()*(GAME_W-w-edge*2),y=edge+Math.random()*(GAME_H-h-edge*2);let ok=true;for(const o of obs)if(x<o.x+o.w+GAP&&x+w>o.x-GAP&&y<o.y+o.h+GAP&&y+h>o.y-GAP){ok=false;break;}if(ok){obs.push({x,y,w,h});break;}}}
  return obs;
}

function pathClear(x,y,angle,obstacles,mapW,mapH){
  const m=BORDER+PRADIUS+40,steps=10,dist=200;
  for(let s=1;s<=steps;s++){const px=x+Math.cos(angle)*(s/steps)*dist,py=y+Math.sin(angle)*(s/steps)*dist;if(px<m||px>mapW-m||py<m||py>mapH-m)return false;for(const o of obstacles)if(circleRect(px,py,PRADIUS+10,o.x,o.y,o.w,o.h))return false;}
  return true;
}

function findSafeSpawn(obstacles,mapW,mapH,excludeX,excludeY,preferAngle){
  const m=BORDER+PRADIUS+40;
  for(let i=0;i<300;i++){const x=m+Math.random()*(mapW-m*2),y=m+Math.random()*(mapH-m*2);if(excludeX!==null){const dx=x-excludeX,dy=y-excludeY;if(dx*dx+dy*dy<80*80)continue;}let onObstacle=false;for(const o of obstacles)if(circleRect(x,y,PRADIUS+20,o.x,o.y,o.w,o.h)){onObstacle=true;break;}if(onObstacle)continue;const base=preferAngle??Math.random()*Math.PI*2;for(let a=0;a<8;a++){const angle=base+(a/8)*Math.PI*2;if(pathClear(x,y,angle,obstacles,mapW,mapH))return{x,y,angle};}}
  return{x:mapW/2,y:mapH/3,angle:-Math.PI/2};
}
function spInit(){
  spObstacles=randomObstacles();
  const sp=findSafeSpawn(spObstacles,GAME_W,GAME_H,null,null,-Math.PI/2);
  spPlayer={x:sp.x,y:sp.y,angle:sp.angle,speed:MIN_SPD,trail:[],alive:true};
  spMaxSpeed=MIN_SPD;
  spBots=Array.from({length:NUM_BOTS},()=>{const p=findSafeSpawn(spObstacles,GAME_W,GAME_H,sp.x,sp.y,null);return{x:p.x,y:p.y,angle:p.angle,speed:MIN_SPD,color:BOT_COLORS[Math.floor(Math.random()*BOT_COLORS.length)],turning:0,thinkTimer:0,trail:[],dead:false};});
}

function spDrawPreview(){
  drawBg(spObstacles);
  for(const b of spBots){drawTrail(fakeTrail(b.x,b.y,b.angle),MIN_SPD,h2r(b.color));ctx.beginPath();ctx.arc(b.x,b.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=b.color;ctx.fill();}
  drawTrail(fakeTrail(spPlayer.x,spPlayer.y,spPlayer.angle),MIN_SPD,'rgb(231,76,60)');
  ctx.beginPath();ctx.arc(spPlayer.x,spPlayer.y,PRADIUS,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('Das bist du!',spPlayer.x,spPlayer.y-PRADIUS-12);
}

function spStartCountdown(){
  phase='sp-countdown';for(const el of Object.values(SCREENS))el.classList.add('hidden');hudEl.classList.add('hidden');
  let count=3;cdEl.style.display='block';cdEl.textContent=count;spDrawPreview();
  const iv=setInterval(()=>{count--;if(count>0){cdEl.textContent=count;spDrawPreview();}else{clearInterval(iv);cdEl.style.display='none';spBegin();}},1000);
}

function spBegin(){
  phase='sp-active';spStartTime=performance.now();
  lastTime=null;animId=requestAnimationFrame(spLoop);
}

function updateBot(bot,dt){
  if(bot.dead)return;
  const wall=BORDER+PRADIUS;
  const emg=wall+60+Math.pow(bot.speed,2)/800;
  if(bot.x<emg||bot.x>GAME_W-emg||bot.y<emg||bot.y>GAME_H-emg){const d=angleDiff(Math.atan2(GAME_H/2-bot.y,GAME_W/2-bot.x),bot.angle);bot.turning=d>0?1:-1;bot.thinkTimer=0;}
  else{
    bot.thinkTimer-=dt;
    if(bot.thinkTimer<=0){
      bot.thinkTimer=0.03+Math.random()*0.02;
      const look=Math.max(200,bot.speed*1.8);
      const ahead=raycastCurved(bot.x,bot.y,bot.angle,bot.speed,0,look);
      const left=raycastCurved(bot.x,bot.y,bot.angle,bot.speed,-1,look);
      const right=raycastCurved(bot.x,bot.y,bot.angle,bot.speed,1,look);
      if(ahead<look*0.7){bot.turning=left>right?-1:1;}
      else if(left<look*0.7&&right>=look*0.7){bot.turning=1;}
      else if(right<look*0.7&&left>=look*0.7){bot.turning=-1;}
      else{const pdx=spPlayer.x-bot.x,pdy=spPlayer.y-bot.y,pdist=Math.sqrt(pdx*pdx+pdy*pdy);if(pdist<600){const pa=Math.atan2(pdy,pdx);if(bot.speed>spPlayer.speed*1.05){const d=angleDiff(pa,bot.angle);bot.turning=d>0.05?1:d<-0.05?-1:0;}else if(bot.speed<spPlayer.speed*0.9){const d=angleDiff(pa+Math.PI,bot.angle);bot.turning=d>0.1?1:d<-0.1?-1:0;}else bot.turning=0;}else if(pdist<1200){const fx=spPlayer.x+Math.cos(spPlayer.angle)*spPlayer.speed*1.2,fy=spPlayer.y+Math.sin(spPlayer.angle)*spPlayer.speed*1.2,ia=Math.atan2(fy-bot.y,fx-bot.x),d=angleDiff(ia,bot.angle);bot.turning=Math.abs(d)>0.15?(d>0?1:-1):0;}else bot.turning=Math.random()<0.08?(Math.random()<0.5?-1:1):0;}
    }
  }
  const turning=bot.turning!==0;
  if(turning){bot.speed=Math.max(MIN_SPD,bot.speed*Math.exp(-DECEL*dt));const tr=TURN_RATE/(1+Math.pow(bot.speed/300,2)*8);bot.angle+=tr*bot.turning*dt;}
  else bot.speed=Math.min(MAX_SPD,bot.speed*Math.exp(ACCEL*dt));
  bot.x+=Math.cos(bot.angle)*bot.speed*dt;bot.y+=Math.sin(bot.angle)*bot.speed*dt;
  bot.trail.push({x:bot.x,y:bot.y});if(bot.trail.length>300)bot.trail.shift();
  const wall2=BORDER+PRADIUS;
  if(bot.x<wall2||bot.x>GAME_W-wall2||bot.y<wall2||bot.y>GAME_H-wall2){spawnExplosion(bot.x,bot.y,bot.color);bot.dead=true;return;}
  for(const o of spObstacles)if(circleRect(bot.x,bot.y,PRADIUS,o.x,o.y,o.w,o.h)){spawnExplosion(bot.x,bot.y,bot.color);bot.dead=true;return;}
}

function spLoop(ts){
  if(phase!=='sp-active'){animId=null;return;}
  if(!lastTime)lastTime=ts;
  const dt=Math.min((ts-lastTime)/1000,0.05);lastTime=ts;
  const turning=keys.ArrowLeft||keys.ArrowRight;
  if(turning)spPlayer.speed=Math.max(MIN_SPD,spPlayer.speed*Math.exp(-DECEL*dt));
  else spPlayer.speed=Math.min(MAX_SPD,spPlayer.speed*Math.exp(ACCEL*dt));
  if(spPlayer.speed>spMaxSpeed)spMaxSpeed=spPlayer.speed;
  const ptr=TURN_RATE/(1+Math.pow(spPlayer.speed/300,2)*8);
  if(keys.ArrowLeft)spPlayer.angle-=ptr*dt;
  if(keys.ArrowRight)spPlayer.angle+=ptr*dt;
  spPlayer.x+=Math.cos(spPlayer.angle)*spPlayer.speed*dt;
  spPlayer.y+=Math.sin(spPlayer.angle)*spPlayer.speed*dt;
  spPlayer.trail.push({x:spPlayer.x,y:spPlayer.y});if(spPlayer.trail.length>400)spPlayer.trail.shift();
  const wall=BORDER+PRADIUS;
  if(spPlayer.x<wall||spPlayer.x>GAME_W-wall||spPlayer.y<wall||spPlayer.y>GAME_H-wall){spawnExplosion(spPlayer.x,spPlayer.y,'#e74c3c');spPlayer.alive=false;setTimeout(()=>spEnd('lose','Rand beruehrt!'),400);return;}
  for(const o of spObstacles)if(circleRect(spPlayer.x,spPlayer.y,PRADIUS,o.x,o.y,o.w,o.h)){spawnExplosion(spPlayer.x,spPlayer.y,'#e74c3c');spPlayer.alive=false;setTimeout(()=>spEnd('lose','Hindernis getroffen!'),400);return;}
  for(const b of spBots)updateBot(b,dt);
  for(const b of spBots){if(b.dead)continue;const dx=spPlayer.x-b.x,dy=spPlayer.y-b.y;if(dx*dx+dy*dy<(PRADIUS*2)*(PRADIUS*2)){if(spPlayer.speed>=b.speed){spawnExplosion(b.x,b.y,b.color);b.dead=true;spPlayer.speed=Math.max(MIN_SPD,spPlayer.speed/2);}else{spawnExplosion(spPlayer.x,spPlayer.y,'#e74c3c');spPlayer.alive=false;setTimeout(()=>spEnd('lose','Bot getroffen! (zu langsam)'),400);return;}}}
  for(let i=0;i<spBots.length;i++){if(spBots[i].dead)continue;for(let j=i+1;j<spBots.length;j++){if(spBots[j].dead)continue;const dx=spBots[i].x-spBots[j].x,dy=spBots[i].y-spBots[j].y;if(dx*dx+dy*dy<(PRADIUS*2)*(PRADIUS*2)){if(spBots[i].speed>=spBots[j].speed){spawnExplosion(spBots[j].x,spBots[j].y,spBots[j].color);spBots[j].dead=true;}else{spawnExplosion(spBots[i].x,spBots[i].y,spBots[i].color);spBots[i].dead=true;}}}}
  if(spBots.every(b=>b.dead)){spEnd('win','Alle Bots eliminiert!');return;}
  drawBg(spObstacles);updateParticles(dt);
  drawTrail(spPlayer.trail,spPlayer.speed,'rgb(231,76,60)');
  for(const b of spBots){if(b.dead)continue;drawTrail(b.trail,b.speed,h2r(b.color));ctx.beginPath();ctx.arc(b.x,b.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=b.color;ctx.fill();}
  // Spieler mit Glow ab Tempo 200
  if(spPlayer.alive){
    ctx.save();
    if(spPlayer.speed>=200){
      const glowIntensity=Math.min(1,(spPlayer.speed-200)/(MAX_SPD-200));
      ctx.shadowColor='rgba(255,255,200,'+(glowIntensity*0.9)+')';
      ctx.shadowBlur=15+glowIntensity*40;
    }
    ctx.beginPath();ctx.arc(spPlayer.x,spPlayer.y,PRADIUS,0,Math.PI*2);ctx.fillStyle='#e74c3c';ctx.fill();
    ctx.restore();
  }
  drawParticles();
  animId=requestAnimationFrame(spLoop);
}

function spEnd(outcome,reason){
  if(animId){cancelAnimationFrame(animId);animId=null;}
  phase='result';hudEl.classList.add('hidden');
  const tEl=document.getElementById('result-title'),sEl=document.getElementById('result-sub');
  const elapsed=((performance.now()-spStartTime)/1000).toFixed(1);
  if(outcome==='win'){tEl.style.color='#2ecc71';tEl.textContent='Sieg!';}
  else{tEl.style.color='#e74c3c';tEl.textContent='Game Over';}
  sEl.textContent=reason+' | Hoechstgeschw.: '+Math.round(spMaxSpeed)+' | Zeit: '+elapsed+'s';
  spLastMode='single';
  const btnAgain=document.getElementById('btn-again');
  btnAgain.textContent='Nochmal (Einzelspieler)';btnAgain.className='btn-sp';
  showScreen('result');spInit();spDrawPreview();
}
let ws=null,myId=null,mpData=null,mpMode='5p';
let mpLocal=null;

function sendInput(){if(phase!=='mp-active'||!ws||ws.readyState!==1)return;const dir=keys.ArrowLeft?'left':keys.ArrowRight?'right':'none';ws.send(JSON.stringify({type:'input',direction:dir}));}
function getUrl(){const p=location.protocol==='https:'?'wss':'ws';return p+'://'+location.host;}

function mpTickLocal(dt){
  if(!mpLocal)return;
  const turning=keys.ArrowLeft||keys.ArrowRight;
  if(turning){mpLocal.speed=Math.max(MIN_SPD,mpLocal.speed*Math.exp(-DECEL*dt));}
  else{mpLocal.speed=Math.min(MAX_SPD,mpLocal.speed*Math.exp(ACCEL*dt));}
  const ptr=TURN_RATE/(1+Math.pow(mpLocal.speed/300,2)*8);
  if(keys.ArrowLeft)mpLocal.angle-=ptr*dt;
  if(keys.ArrowRight)mpLocal.angle+=ptr*dt;
  mpLocal.x+=Math.cos(mpLocal.angle)*mpLocal.speed*dt;
  mpLocal.y+=Math.sin(mpLocal.angle)*mpLocal.speed*dt;
  mpLocal.trail.push({x:mpLocal.x,y:mpLocal.y});
  if(mpLocal.trail.length>400)mpLocal.trail.shift();
}

let mpAnimId=null,mpLastTime=null;
function mpRenderLoop(ts){
  if(phase!=='mp-active'&&phase!=='mp-spectate'){mpAnimId=null;return;}
  if(!mpLastTime)mpLastTime=ts;
  const dt=Math.min((ts-mpLastTime)/1000,0.05);mpLastTime=ts;
  if(phase==='mp-active')mpTickLocal(dt);
  if(mpData&&mpLastServerState)mpDrawFrame(mpLastServerState);
  mpAnimId=requestAnimationFrame(mpRenderLoop);
}
let mpLastServerState=null;

function connect(mode){
  mpMode=mode;errEl.textContent='';
  try{ws=new WebSocket(getUrl());}catch(e){errEl.textContent='Verbindung fehlgeschlagen.';return;}
  ws.onopen=()=>{ws.send(JSON.stringify({type:'join_queue',mode:mode==='1v1'?'1v1':'5p',platform:isMobile()?'mobile':'desktop'}));waitTitleEl.textContent=mode==='1v1'?'Suche Gegner...':'Suche Spieler...';qcEl.textContent='0 / '+(mode==='1v1'?'2':'5')+' Spieler';showScreen('wait');phase='mp-wait';};
  ws.onerror=()=>{errEl.textContent='Verbindung fehlgeschlagen.';showScreen('menu');phase='menu';ws=null;};
  ws.onclose=()=>{if(phase!=='menu'&&phase!=='result'){errEl.textContent='Verbindung getrennt.';showScreen('menu');phase='menu';}ws=null;};
  ws.onmessage=e=>{try{mpHandle(JSON.parse(e.data));}catch(_){}};
}
function disconnect(){if(ws){ws.close();ws=null;}}

function mpHandle(msg){
  if(msg.type==='queue_update'){qcEl.textContent=msg.count+' / '+msg.max+' Spieler';}
  else if(msg.type==='game_init'){
    myId=msg.playerId;mpData={players:msg.players,obstacles:msg.obstacles,mapWidth:msg.mapWidth,mapHeight:msg.mapHeight};
    // Canvas auf Server-Dimensionen setzen
    setCanvasSize(msg.mapWidth,msg.mapHeight);applyZoom();
    const me=msg.players.find(p=>p.id===myId);
    if(me)mpLocal={x:me.x,y:me.y,angle:me.angle,speed:MIN_SPD,trail:[],alive:true};
    mpLastServerState=null;mpLastTime=null;
    phase='mp-preview';for(const el of Object.values(SCREENS))el.classList.add('hidden');hudEl.classList.add('hidden');mpDrawPreview();
  }
  else if(msg.type==='countdown'){
    phase='mp-countdown';cdEl.style.display='block';
    if(msg.value>0){cdEl.textContent=msg.value;mpDrawPreview();}
    else{cdEl.style.display='none';phase='mp-active';mpLastTime=null;mpAnimId=requestAnimationFrame(mpRenderLoop);}
  }
  else if(msg.type==='game_state'){
    mpLastServerState=msg;
    if(mpLocal&&myId){const me=msg.players.find(p=>p.id===myId);if(me&&!me.alive)mpLocal.alive=false;}
    if(phase==='mp-spectate')mpDrawFrame(msg);
  }
  else if(msg.type==='game_over'){mpEnd(msg);}
  else if(msg.type==='error'){errEl.textContent=msg.message||'Serverfehler.';showScreen('menu');phase='menu';disconnect();}
}

function mpDrawPreview(){
  if(!mpData)return;drawBg(mpData.obstacles);
  for(const p of mpData.players){drawTrail(fakeTrail(p.x,p.y,p.angle),100,h2r(p.colorHex));ctx.beginPath();ctx.arc(p.x,p.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=p.colorHex;ctx.fill();if(p.id===myId){ctx.fillStyle='#fff';ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.fillText('Das bist du!',p.x,p.y-PRADIUS-12);}}
}

function mpDrawFrame(msg){
  if(!mpData)return;
  const dt=mpLastTime?(performance.now()-mpLastTime)/1000:0;
  updateParticles(dt);drawBg(mpData.obstacles);
  let me=null;
  for(const p of msg.players){
    if(p.id===myId){me=p;continue;}
    const col=h2r(p.colorHex||'#ffffff');
    if(p.alive){drawTrail(p.trail,p.speed,col);ctx.beginPath();ctx.arc(p.x,p.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=p.colorHex||'#fff';ctx.fill();}
    else{if(!p._exploded){p._exploded=true;spawnExplosion(p.x,p.y,p.colorHex||'#fff');}ctx.globalAlpha=0.2;ctx.beginPath();ctx.arc(p.x,p.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=p.colorHex||'#fff';ctx.fill();ctx.globalAlpha=1;}
  }
  if(mpLocal&&mpLocal.alive){
    const myColor=me?me.colorHex:'#e74c3c';
    drawTrail(mpLocal.trail,mpLocal.speed,h2r(myColor));
    ctx.save();
    if(mpLocal.speed>=200){
      const glowIntensity=Math.min(1,(mpLocal.speed-200)/(MAX_SPD-200));
      ctx.shadowColor='rgba(255,255,200,'+(glowIntensity*0.9)+')';
      ctx.shadowBlur=15+glowIntensity*40;
    }
    ctx.beginPath();ctx.arc(mpLocal.x,mpLocal.y,PRADIUS,0,Math.PI*2);ctx.fillStyle=myColor;ctx.fill();
    ctx.restore();
  }
  drawParticles();
  if(me&&!me.alive&&mpLocal){if(!me._exploded){me._exploded=true;spawnExplosion(me.x,me.y,me.colorHex||'#e74c3c');}mpLocal.alive=false;if(phase==='mp-active'){phase='mp-spectate';specEl.style.display='block';}}
}

function mpEnd(msg){
  if(mpAnimId){cancelAnimationFrame(mpAnimId);mpAnimId=null;}
  mpLocal=null;mpLastServerState=null;
  phase='result';hudEl.classList.add('hidden');specEl.style.display='none';cdEl.style.display='none';
  const tEl=document.getElementById('result-title'),sEl=document.getElementById('result-sub');
  if(msg.winnerId===myId){tEl.style.color='#2ecc71';tEl.textContent='Sieg!';sEl.textContent='Du hast gewonnen!';}
  else if(!msg.winnerId){tEl.style.color='#f39c12';tEl.textContent='Unentschieden';sEl.textContent='Alle gleichzeitig ausgeschieden.';}
  else{tEl.style.color='#e74c3c';tEl.textContent='Niederlage';sEl.textContent='Ein anderer Spieler hat gewonnen.';}
  sEl.textContent+=' | Zeit: '+(msg.elapsedMs/1000).toFixed(1)+'s';
  spLastMode=mpMode==='1v1'?'1v1':'multi';
  const btnAgain=document.getElementById('btn-again');
  if(mpMode==='1v1'){btnAgain.textContent='Nochmal (1v1)';btnAgain.className='btn-1v1';}
  else{btnAgain.textContent='Nochmal (5 Spieler)';btnAgain.className='btn-5p';}
  showScreen('result');
  setCanvasSize(isPortrait()?GAME_W_PORTRAIT:GAME_W_LANDSCAPE,isPortrait()?GAME_H_PORTRAIT:GAME_H_LANDSCAPE);
  applyZoom();spInit();spDrawPreview();
}

document.getElementById('btn-single').addEventListener('click',()=>{spInit();spDrawPreview();spStartCountdown();});
document.getElementById('btn-1v1').addEventListener('click',()=>connect('1v1'));
document.getElementById('btn-find').addEventListener('click',()=>connect('5p'));
document.getElementById('btn-cancel').addEventListener('click',()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'leave_queue'}));disconnect();showScreen('menu');phase='menu';});
document.getElementById('btn-again').addEventListener('click',()=>{
  hudEl.classList.add('hidden');specEl.style.display='none';
  if(spLastMode==='single'){spInit();spDrawPreview();spStartCountdown();}
  else if(spLastMode==='1v1'){showScreen('wait');phase='mp-wait';if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'join_queue',mode:'1v1',platform:isMobile()?'mobile':'desktop'}));else connect('1v1');}
  else{showScreen('wait');phase='mp-wait';if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'join_queue',mode:'5p',platform:isMobile()?'mobile':'desktop'}));else connect('5p');}
});
document.getElementById('btn-menu').addEventListener('click',()=>{disconnect();showScreen('menu');phase='menu';hudEl.classList.add('hidden');specEl.style.display='none';setCanvasSize(isPortrait()?GAME_W_PORTRAIT:GAME_W_LANDSCAPE,isPortrait()?GAME_H_PORTRAIT:GAME_H_LANDSCAPE);applyZoom();spInit();spDrawPreview();});

spInit();spDrawPreview();
</script>
